openapi: 3.1.0

info:
  title: NRI Yield Advisory API (Short Spec)
  version: 1.6.1
  description: |
    Short API specification for the NRI deposit yield optimisation microservice.
    This document contains only meta information, authentication protocols, endpoints,
    parameters, success response payloads, and error codes.
  contact:
    name: Treasury Tech
    email: treasury-tech@bank.example.com

servers:
  - url: https://api.bank.com/v1/nri-yield
    description: Production Server

security:
  - GatewayHMAC: []

paths:
  /optimize:
    post:
      summary: Compute FCNR vs NRE yield recommendation
      description: Evaluates customer's portfolio, market rates, and returns a yield recommendation.
      parameters:
        - name: traceparent
          in: header
          required: true
          schema: { type: string }
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
        - name: X-Employee-ID
          in: header
          required: true
          schema: { type: string }
        - name: X-User-Role
          in: header
          required: true
          schema: { type: string, enum: [RM, SENIOR_RM, TREASURY] }
        - name: X-Gateway-Timestamp
          in: header
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id, risk_profile, principal_amount, base_currency, value_date, tenure_months, channel]
              properties:
                customer_id: { type: string }
                risk_profile: { type: string, enum: [CONSERVATIVE, MODERATE, AGGRESSIVE] }
                principal_amount: { type: string }
                base_currency: { type: string }
                value_date: { type: string, format: date }
                tenure_months: { type: integer }
                channel: { type: string }
                expected_inflation_rate: { type: string }
                fx_rate_overrides: { type: object }
                market_rates_override: { type: object }
                assets: { type: array, items: { type: object } }
                liabilities: { type: array, items: { type: object } }
      responses:
        '200':
          description: Recommendation computed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  advisory:
                    type: object
                    properties:
                      recommended_product: { type: string }
                      compliance_warnings: { type: array, items: { type: string } }
                      fx_risk_flag: { type: boolean }
                  compliance: { type: object }
                  decision_trace: { type: object }
                  metadata: { type: object }
        '400': { description: Bad Request }
        '401': { description: Unauthorized / Signature Mismatch }
        '403': { description: Forbidden / Insufficient Role }
        '409': { description: Idempotency Conflict }
        '422': { description: Unprocessable Entity }
        '429': { description: Too Many Requests }
        '500': { description: Internal Server Error }
        '503': { description: Service Unavailable }

  /recommendations/{recommendation_id}:
    get:
      summary: Retrieve a historical recommendation
      parameters:
        - name: recommendation_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Recommendation retrieved successfully.
        '404':
          description: Recommendation not found.

  /rates:
    get:
      summary: Current rate matrix and TMS feeds
      responses:
        '200':
          description: Current policy store and TMS matrix returned successfully.

  /health/ready:
    get:
      summary: Kubernetes readiness probe
      responses:
        '200':
          description: Service is healthy.

components:
  securitySchemes:
    GatewayHMAC:
      type: apiKey
      in: header
      name: X-Internal-Signature
