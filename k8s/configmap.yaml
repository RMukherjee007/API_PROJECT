apiVersion: v1
kind: ConfigMap
metadata:
  name: nri-config
  namespace: nri-yield
data:
  NODE_ENV: "production"
  GATEWAY_PORT: "8080"
  ESB_PORT: "8081"
  YIELD_ENGINE_PORT: "8082"
  AUTH_PORT: "8083"
  AUDIT_PORT: "8084"
  BANK_PORT: "8085"
  FRONTEND_PORT: "3000"
  PUBLIC_API_BASE: "http://gateway:8080"
  YIELD_ENGINE_URL: "http://yield-engine:8082"
  ESB_URL: "http://esb:8081"
  AUTH_SERVICE_URL: "http://auth:8083"
  AUDIT_SERVICE_URL: "http://audit:8084"
  BANK_INTEGRATION_SERVICE_URL: "http://bank:8085"
  REDIS_URL: "redis://redis:6379"
  STORAGE_DRIVER: "mysql"
  MYSQL_HOST: "mysql"
  MYSQL_PORT: "3306"
  MYSQL_USER: "app_user"
  MYSQL_DATABASE: "csb_bank"
  CBS_CACHE_TTL_SECONDS: "120"
  CORS_ORIGINS: "http://localhost:3000"
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX: "100"
  AUDIT_RETENTION_DAYS: "90"
  RATE_UPDATE_INTERVAL_MS: "60000"
  BANK_LIVE_MODE: "false"
  CBS_ADAPTER_URL: "http://placeholder-cbs-api.local/api/portfolio"
  TMS_MARKET_DATA_URL: "http://placeholder-tms-api.local/api/rates"
