apiVersion: v1
kind: ConfigMap
metadata:
  name: nri-config
  namespace: nri-yield
data:
  NODE_ENV: "production"
  GATEWAY_PORT: "8080"
  YIELD_ENGINE_PORT: "8082"
  ESB_PORT: "8081"
  FRONTEND_PORT: "3000"
  YIELD_ENGINE_URL: "http://yield-engine:8082"
  ESB_URL: "http://esb:8081"
  REDIS_URL: "redis://redis:6379"
  CBS_CACHE_TTL_SECONDS: "120"
  CORS_ORIGINS: "http://localhost:3000"
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX: "100"
  AUDIT_RETENTION_DAYS: "90"
  RATE_UPDATE_INTERVAL_MS: "60000"
