apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: nri-yield
spec:
  replicas: 1
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
      - name: frontend
        image: nri-yield/frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef: { name: nri-config }
        resources:
          requests: { cpu: "50m", memory: "64Mi" }
          limits: { cpu: "200m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: nri-yield
spec:
  selector: { app: frontend }
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  type: ClusterIP
