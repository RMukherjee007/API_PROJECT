apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit
  namespace: nri-yield
spec:
  replicas: 1
  selector:
    matchLabels: { app: audit }
  template:
    metadata:
      labels: { app: audit }
    spec:
      containers:
      - name: audit
        image: nri-yield/audit:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 8084
        envFrom:
        - configMapRef: { name: nri-config }
        - secretRef: { name: nri-secrets }
        livenessProbe:
          httpGet: { path: /health/live, port: 8084 }
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet: { path: /health/ready, port: 8084 }
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests: { cpu: "50m", memory: "64Mi" }
          limits: { cpu: "200m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: audit
  namespace: nri-yield
spec:
  selector: { app: audit }
  ports:
  - port: 8084
    targetPort: 8084
    name: http
  type: ClusterIP
