openapi: 3.1.0

info:
  title: NRI Yield Advisory API
  version: 1.6.1
  description: |
    Stateless microservice for NRI deposit yield optimisation.
    Compares FCNR(B) and NRE accounts using Asset-Liability Matching (ALM),
    exact day-count yield computation, full cross-currency portfolio conversion,
    and optional inflation-adjusted real yields — returning an RBI-compliant audit trail.

    **What this service returns to the RM:**
    - A routing recommendation: `FCNR`, `NRE`, or `EQUAL_YIELD` (15 bps decision buffer)
    - `advisory.fx_risk_flag` — set when FCNR is recommended to a CONSERVATIVE customer
    - All compliance notices pre-generated: withdrawal rules, tax treatment, TDS flag

    **ALM model — full cross-currency support:** all asset and liability positions,
    in any FCNR-eligible currency, are converted to a common INR base using the live
    Treasury Management System (Live Market API) cross-rate matrix. If total INR-equivalent
    liabilities exceed total INR-equivalent assets, an ALM penalty (in basis points)
    is deducted from the nominal FCNR rate before comparison. No duration weighting —
    `liability_type` is recorded for audit only.

    **GCC currencies & IFSC routing:** AED, SAR, QAR, OMR, BHD, and KWD are natively
    supported for FCNR. Because these currencies are heavily managed or pegged, RBI
    guidelines restrict them to deposits booked through the bank's IFSC (GIFT City)
    branch units. A GCC `base_currency` requires a `branch_code` belonging to an IFSC unit;
    violations return `422 GCC_REQUIRES_IFSC_BRANCH`.

    **Live Market API integration and rate overrides:** live FX spot and forward curves are pulled
    automatically from the Live Market API. `SENIOR_RM` and `TREASURY` roles may supply
    `fx_rate_overrides` (FX rates, max ±10% deviation from Live Market API) and/or
    `market_rates_override` (FCNR/NRE interest rates, max ±200 bps deviation from
    the policy store). Both require `override_reason`. An `RM` submitting either
    object receives `403 INSUFFICIENT_ROLE`.

    **Inflation and real yields:** `india_inflation_rate` and `foreign_inflation_rate` are optional. When
    supplied, the engine additionally computes inflation-adjusted real yields using
    the exact Fisher equation for PPP comparison:

    ```
    Real Yield = ((1 + Nominal Yield) / (1 + Inflation)) - 1
    ```

    `decision_trace.calculation_method` records whether the comparison used `NOMINAL`
    or `REAL_PPP_ADJUSTED` yields.

    **Decision buffer:** a 15 basis point (0.15%) buffer is applied before recommending
    FCNR or NRE outright — differences inside the buffer return `EQUAL_YIELD`, preventing
    the recommendation from flipping on negligible rate noise.

    **Error handling:** all fault states return `application/problem+json` (RFC 7807).
    **Distributed tracing:** W3C Trace Context `traceparent` header on all requests.
    **Yield precision:** exact Actual/360 (FCNR) and Actual/365 (NRE) from `value_date`.

    ---

    ## Gateway + ESB Enrichment Architecture

    ```
    RM Screen → API Gateway → [ Redis Cache | Lightweight ESB → Legacy CBS ]
                                     → Microservice → RM Screen
    ```

    **Step 1 — Thin Frontend Request.** The RM enters `customer_id`, `risk_profile`,
    `principal_amount`, `base_currency`, `value_date`, `tenure_months`, `channel`, and
    optionally inflation rates (`india_inflation_rate` and `foreign_inflation_rate`) and rate overrides. No portfolio data required.

    **Step 2 — Gateway Cache Lookup.** The Gateway checks Redis key
    `cbs_portfolio:{customer_id}` (TTL: 120 seconds).
    - **Cache HIT** — portfolio returned in < 1 ms. ESB and CBS bypassed entirely.
    - **Cache MISS** — Gateway delegates to the Lightweight ESB (Step 3).

    **Step 3 — ESB Fetch (on Cache Miss).** The Gateway delegates the data fetch to the
    Lightweight ESB. The ESB alone is responsible for legacy protocol translation, CBS
    connection handshakes, timeout management, and determining the fallback state if
    CBS is unreachable. On success, the Gateway writes the portfolio to Redis with
    `EXPIRE 120` and injects `assets` and `liabilities` into the request body. If the
    ESB reports CBS is down, `X-Portfolio-Source: NOT_AVAILABLE` is set.

    **Step 4 — Microservice Math Execution.** The service receives the enriched
    request, pulls live Live Market API rates (or applies RM/Senior RM overrides), converts every
    position to INR, runs the ALM check, computes nominal yields, optionally computes
    real yields via the Fisher equation, and returns the recommendation.

    **Step 5 — Automatic Cache Expiry.** Redis purges portfolio keys exactly 120
    seconds after population.

    ---

    **Authentication flow:** the Gateway validates `X-Internal-Signature` (HMAC-SHA256)
    and injects `X-Employee-ID` and `X-User-Role` from the session token. Client
    applications must not set these headers.

    **Key product rules:**
    - FCNR(B): Foreign currency deposit. Min 12, max 60 months. No premature withdrawal
      within the first 12 months per RBI Master Direction. GCC currencies require an
      IFSC branch.
    - NRE FD: Converted to INR at spot. Interest tax-exempt under Section 10(4) of the
      Income Tax Act, 1961. Freely repatriable. `base_currency: INR` evaluates NRE only.
    - ALM penalty: applied when total INR-equivalent liabilities exceed total assets.
      Zero when portfolio is unavailable.
    - EQUAL_YIELD: returned when the yield difference is within the 15 bps decision buffer.
  contact:
    name: Treasury Tech
    email: treasury-tech@bank.example.com
  x-slo:
    p95_ms: 250
    timeout_ms: 1000

tags:
  - name: Yield
    description: Yield computation and historical retrieval
  - name: Rates
    description: Live interest rate and Live Market API FX curve matrix
  - name: Health
    description: Kubernetes operational probes

servers:
  - url: https://api.bank.com/v1/nri-yield
    description: Production
  - url: https://api.uat.bank.com/v1/nri-yield
    description: UAT

security:
  - GatewayHMAC: []

# ─────────────────────────────────────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────────────────────────────────────
paths:

  /optimize:
    post:
      tags: [Yield]
      operationId: optimizeYield
      summary: Compute FCNR vs NRE yield recommendation
      description: |
        Stateless engine. Returns:
        - `advisory.recommended_product` — FCNR, NRE, or EQUAL_YIELD
        - `advisory.fx_risk_flag` — whether the RM must discuss currency risk
        - `advisory.compliance_warnings` — operational flags
        - `compliance` — withdrawal rules, tax treatment, TDS flag
        - `decision_trace` — frozen inputs and intermediate math for RBI audit
        - `metadata` — audit trail with portfolio enrichment source

        **Idempotency:** same `Idempotency-Key` + identical body → 200 with
        `X-Idempotency-Replay: true` (24-hour TTL). Same key, different body → 409.
      parameters:
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/EmployeeId'
        - $ref: '#/components/parameters/UserRole'
        - $ref: '#/components/parameters/GatewayTimestamp'
        - $ref: '#/components/parameters/PortfolioSource'
        - $ref: '#/components/parameters/PortfolioCacheAge'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OptimizeRequest'
            examples:
              frontend_thin:
                $ref: '#/components/examples/FrontendThinRequest'
              rm_custom_rates:
                $ref: '#/components/examples/RMCustomRatesRequest'
              gateway_enriched:
                $ref: '#/components/examples/GatewayEnrichedRequest'
              manual_override:
                $ref: '#/components/examples/ManualOverrideRequest'
      responses:
        '200':
          description: Recommendation computed successfully.
          headers:
            X-Idempotency-Replay:
              schema: { type: string, enum: ['true', 'false'] }
              description: "'true' when served from the idempotency cache."
            X-Portfolio-Source:
              schema: { type: string, enum: [CACHE_HIT, ESB_FETCH, NOT_AVAILABLE] }
              description: How the customer portfolio was resolved. Echoed from the gateway-injected header.
            X-Portfolio-Cache-Age-Seconds:
              schema: { type: integer, minimum: 0, maximum: 119 }
              description: Age of Redis cache entry in seconds. Present only when X-Portfolio-Source is CACHE_HIT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizeResponse'
              examples:
                success:
                  $ref: '#/components/examples/OptimizeResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/IdempotencyConflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }

  /recommendations/{recommendation_id}:
    get:
      tags: [Yield]
      operationId: getRecommendation
      summary: Retrieve a historical recommendation
      description: |
        Fetches a stored recommendation from the audit store (90-day retention).
        Used for RM follow-up calls and regulatory review. `metadata.retrieved_at`
        is populated; all other fields are identical to the original response.
      parameters:
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/EmployeeId'
        - $ref: '#/components/parameters/UserRole'
        - $ref: '#/components/parameters/GatewayTimestamp'
        - name: recommendation_id
          in: path
          required: true
          schema: { type: string, format: uuid }
          example: "9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d"
          description: The `recommendation_id` UUID from the original POST /optimize response.
      responses:
        '200':
          description: Recommendation retrieved successfully from the audit store.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OptimizeResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }

  /rates:
    get:
      tags: [Rates]
      operationId: getRates
      summary: Current rate matrix and Live Market API feeds
      description: |
        Returns the live policy_version, nominal NRE/FCNR rate matrices, and the full
        Live Market API spot/forward FX curves. Lets the RM verify the inputs behind any
        recommendation, or check current levels before negotiating an override.
      parameters:
        - $ref: '#/components/parameters/Traceparent'
        - $ref: '#/components/parameters/EmployeeId'
        - $ref: '#/components/parameters/UserRole'
        - $ref: '#/components/parameters/GatewayTimestamp'
      responses:
        '200':
          description: Current policy store and Live Market API matrix returned successfully.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RatesResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalServerError' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }

  /health/ready:
    get:
      tags: [Health]
      summary: Kubernetes readiness probe
      description: |
        Reports whether the service is healthy and routing traffic, including the
        current circuit breaker states of the ESB and Live Market API feed dependencies.
        Redis, the Lightweight ESB, and the legacy CBS are Gateway concerns and
        are not part of this microservice's own dependency set.
      responses:
        '200':
          description: Service is healthy and routing traffic.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthReadyResponse' }
        '503':
          description: Service degraded — a core downstream dependency is down.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthReadyResponse' }

# ─────────────────────────────────────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────────────────────────────────────
components:

  # ── Parameters ────────────────────────────────────────────────────────────
  parameters:

    Traceparent:
      in: header
      name: traceparent
      required: true
      schema:
        type: string
        pattern: '^00-[0-9a-f]{32}-[0-9a-f]{16}-[0-9a-f]{2}$'
      example: "00-4bf92f3577b34da6a3ce929d0e0e4736-00f067aa0ba902b7-01"
      description: |
        W3C Trace Context. Compatible with OpenTelemetry, Jaeger, and Zipkin out of the box.

    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: true
      schema: { type: string, minLength: 1, maxLength: 128 }
      example: "idemp-77b3-4da6-a3ce-929d0e0e"
      description: Client-generated key. Combined with SHA-256(body) for 24-hour deduplication.

    EmployeeId:
      in: header
      name: X-Employee-ID
      required: true
      schema: { type: string, minLength: 1, maxLength: 50 }
      example: "EMP88910"
      description: Gateway-injected from the validated session token. Do not set in client requests.

    UserRole:
      in: header
      name: X-User-Role
      required: true
      schema: { type: string, enum: [RM, SENIOR_RM, TREASURY] }
      example: "RM"
      description: Gateway-injected from the validated session token. Do not set in client requests.

    GatewayTimestamp:
      in: header
      name: X-Gateway-Timestamp
      required: true
      schema: { type: integer, format: int64, minimum: 0 }
      example: 1776339480000
      description: Millisecond Unix timestamp stamped by the Gateway. Skew > ±30 s returns 401 (TIMESTAMP_SKEW).

    PortfolioSource:
      in: header
      name: X-Portfolio-Source
      required: true
      schema: { type: string, enum: [CACHE_HIT, ESB_FETCH, NOT_AVAILABLE] }
      example: "CACHE_HIT"
      description: |
        Gateway-injected. How the customer portfolio was resolved.
        CACHE_HIT     — Redis hit; ESB and CBS bypassed.
        ESB_FETCH     — Redis miss; Gateway delegated to the Lightweight ESB, which
                        successfully fetched from the legacy CBS.
        NOT_AVAILABLE — The ESB reported that the legacy CBS is unreachable or timed out.
                        ALM penalty is zero.
        Do not set in client requests — the gateway overwrites it.

    PortfolioCacheAge:
      in: header
      name: X-Portfolio-Cache-Age-Seconds
      required: false
      schema: { type: integer, minimum: 0, maximum: 119 }
      example: 45
      description: Gateway-injected. Age of the Redis cache entry. Present only when X-Portfolio-Source is CACHE_HIT.

  # ── Security ──────────────────────────────────────────────────────────────
  securitySchemes:
    GatewayHMAC:
      type: apiKey
      in: header
      name: X-Internal-Signature
      description: >
        HMAC-SHA256 signature calculated over:
        `X-Gateway-Timestamp` + "|" + `HTTP_Method` + "|" + `Request_Path` + "|" + `SHA256(Body_String)`

  # ── Schemas ───────────────────────────────────────────────────────────────
  schemas:

    # ── Enumerations ──────────────────────────────────────────────────────

    CustomerRiskProfile:
      type: string
      enum: [CONSERVATIVE, MODERATE, AGGRESSIVE]
      description: |
        Customer's stated risk appetite.
        CONSERVATIVE — sets `advisory.fx_risk_flag: true` whenever FCNR is recommended,
                       prompting the RM to explicitly discuss currency risk.
        MODERATE     — standard ALM calculation. No FX risk flag adjustment.
        AGGRESSIVE   — informational only; no automatic yield adjustment in this version.

    FCNREligibleCurrency:
      type: string
      enum: [USD, GBP, EUR, CAD, AUD, SGD, JPY, CHF, HKD, AED, SAR, QAR, OMR, BHD, KWD]
      description: |
        Eligible currencies for FCNR(B) deposits.
        Note: GCC currencies (AED, SAR, QAR, OMR, BHD, KWD) are strictly restricted
        to deposits booked via the bank's IFSC (GIFT City) units — see `branch_code`.

    DepositBaseCurrency:
      type: string
      enum: [INR, USD, GBP, EUR, CAD, AUD, SGD, JPY, CHF, HKD, AED, SAR, QAR, OMR, BHD, KWD]
      description: |
        Base currency of the deposit. INR is permitted exclusively for NRE-only
        evaluations — when `base_currency` is INR, the FCNR side of the comparison
        is skipped and `decision_trace.product_spot_rate_used` /
        `product_forward_rate_used` are explicitly null.
        GCC currencies are supported strictly for IFSC (GIFT City) branches.

    PositionCurrency:
      type: string
      enum: [INR, USD, GBP, EUR, CAD, AUD, SGD, JPY, CHF, HKD, AED, SAR, QAR, OMR, BHD, KWD]
      description: Currencies accepted for asset and liability positions. Converted to INR via the Live Market API cross-rate matrix.

    AssetType:
      type: string
      enum: [FIXED_DEPOSIT, NRE_ACCOUNT, FCNR_ACCOUNT, SAVINGS_ACCOUNT, MUTUAL_FUND, EQUITY, OTHER]

    LiabilityType:
      type: string
      enum: [HOME_LOAN, LOAN_AGAINST_PROPERTY, CAR_LOAN, PERSONAL_LOAN, CREDIT_CARD_OUTSTANDING, OTHER]
      description: Nature of the liability. Recorded for audit trail only — no duration weighting applied.

    Channel:
      type: string
      enum: [BRANCH, INTERNET_BANKING, MOBILE_APP, RM_PORTAL]
      description: Originating channel. Logged in the audit trail. BRANCH and RM_PORTAL require branch_code.

    RatesSource:
      type: string
      enum: [LIVE_MARKET_API, POLICY_STORE, RM_INPUT, RM_OVERRIDE]
      description: |
        LIVE_MARKET_API     — live Treasury Management System spot/forward FX curves (normal operation).
        POLICY_STORE — nominal FCNR/NRE interest rates from the internal policy store.
        RM_INPUT     — FX rates supplied via `fx_rate_overrides` (SENIOR_RM / TREASURY).
        RM_OVERRIDE  — interest rates supplied via `market_rates_override` (SENIOR_RM / TREASURY).
        Both override sources may be active simultaneously; `decision_trace` always
        records which inputs were actually used for the computation that ran.

    CalculationMethod:
      type: string
      enum: [NOMINAL, REAL_PPP_ADJUSTED]
      description: |
        NOMINAL                 — standard yield comparison (default).
        REAL_PPP_ADJUSTED       — inflation rates were supplied; yields are
                                  stripped of purchasing-power erosion via the Fisher
                                  equation before comparison.

    Recommendation:
      type: string
      enum: [FCNR, NRE, EQUAL_YIELD]
      description: |
        FCNR        — FCNR(B) yields more, beyond the 15 bps decision buffer.
        NRE         — NRE FD yields more, beyond the 15 bps decision buffer.
        EQUAL_YIELD — yield difference is within the 15 bps buffer; no clear winner.

    # ── Portfolio Enrichment ──────────────────────────────────────────────

    PortfolioEnrichment:
      type: object
      additionalProperties: false
      required: [source, positions_injected]
      description: Records how the Gateway/ESB resolved the customer portfolio. Included in every response for audit transparency.
      properties:
        source:
          type: string
          enum: [CACHE_HIT, ESB_FETCH, NOT_AVAILABLE]
          description: |
            CACHE_HIT     — Redis key hit; ESB and CBS bypassed.
            ESB_FETCH     — Redis miss; Gateway delegated to the Lightweight ESB,
                            which successfully fetched from the legacy CBS.
            NOT_AVAILABLE — The ESB reported that CBS is unreachable or timed out.
                            ALM penalty is zero.
        cache_age_seconds:
          type: integer
          minimum: 0
          maximum: 119
          description: Age of the Redis entry in seconds. Present only when source is CACHE_HIT.
        positions_injected:
          type: object
          additionalProperties: false
          required: [asset_count, liability_count]
          properties:
            asset_count: { type: integer, minimum: 0 }
            liability_count: { type: integer, minimum: 0 }

    # ── Positions ─────────────────────────────────────────────────────────

    AssetPosition:
      type: object
      additionalProperties: false
      required: [market_value, currency, asset_type]
      description: |
        A customer asset position in any FCNR-eligible currency, including GCC currencies.
        Converted to INR via the live Live Market API cross-rate matrix for the ALM net-position check.
      properties:
        market_value:
          type: string
          pattern: '^\d+\.\d{2}$'
          description: Current market value in `currency`. Always positive.
        currency:
          $ref: '#/components/schemas/PositionCurrency'
        asset_type:
          $ref: '#/components/schemas/AssetType'
        source:
          type: string
          minLength: 1
          maxLength: 50
          description: Source system identifier (e.g. CBS_CORE, MF_PLATFORM, MANUAL).
        valuation_date:
          type: string
          format: date
          description: Date value was last updated. Positions older than 30 days trigger a compliance warning.

    LiabilityPosition:
      type: object
      additionalProperties: false
      required: [outstanding_principal, currency, liability_type]
      description: |
        A customer liability position in any FCNR-eligible currency, including GCC currencies.
        Converted to INR via the live Live Market API cross-rate matrix for the ALM net-position check.
      properties:
        outstanding_principal:
          type: string
          pattern: '^\d+\.\d{2}$'
          description: Outstanding balance in `currency`. Always positive. For loans, remaining principal only.
        currency:
          $ref: '#/components/schemas/PositionCurrency'
        liability_type:
          $ref: '#/components/schemas/LiabilityType'
        source:
          type: string
          minLength: 1
          maxLength: 50
          description: Source system identifier (e.g. LOS, CBS_CORE, MANUAL).
        valuation_date:
          type: string
          format: date

    # ── Rate Overrides (privileged) ────────────────────────────────────────

    FXRateOverrides:
      type: object
      additionalProperties: false
      description: |
        GATEWAY ENFORCED: restricted to SENIOR_RM and TREASURY roles. An RM submitting
        this object receives 403 INSUFFICIENT_ROLE.
        Max deviation: ±10% from the live Live Market API rates. Breaches return
        422 RATE_OVERRIDE_LIMIT_EXCEEDED.
        Overrides the primary product conversion rate, the forward curve, and/or
        specific portfolio cross-rates used for ALM conversion.
        Setting this object sets `rates_source: RM_INPUT` and
        `is_override_computation: true` in the response.
      properties:
        product_spot_rate:
          type: string
          pattern: '^\d+\.\d{2,6}$'
          description: Override spot rate for the primary deposit conversion (base_currency to INR).
        forward_rates:
          type: object
          description: Override forward rates keyed by tenure in months (e.g. "36").
          patternProperties:
            '^\d+$': { type: string, pattern: '^\d+\.\d{2,6}$' }
          additionalProperties: false
        portfolio_cross_rates:
          type: object
          description: Override cross-rates for specific ALM portfolio positions, keyed as "CCY1/CCY2".
          patternProperties:
            '^[A-Z]{3}/[A-Z]{3}$': { type: string, pattern: '^\d+\.\d{2,6}$' }
          additionalProperties: false

    MarketRatesOverride:
      type: object
      additionalProperties: false
      required: [override_reason]
      description: |
        GATEWAY ENFORCED: restricted to SENIOR_RM and TREASURY roles. An RM submitting
        this object receives 403 INSUFFICIENT_ROLE.
        Max deviation: ±200 bps from the live policy-store interest rates. Breaches
        return 422 RATE_OVERRIDE_LIMIT_EXCEEDED.
        Setting this object sets `rates_source: RM_OVERRIDE` and
        `is_override_computation: true` in the response.
        Can be combined with `fx_rate_overrides` for a fully custom rate scenario.
      properties:
        fcnr_rate_pct:
          type: string
          pattern: '^\d+\.\d{2,4}$'
          description: Override FCNR annual rate as a percentage (e.g. "5.20").
        nre_rate_pct:
          type: string
          pattern: '^\d+\.\d{2,4}$'
          description: Override NRE annual rate as a percentage (e.g. "7.10").
        override_reason:
          type: string
          description: Mandatory justification. Logged permanently in the audit trail.

    # ── Main request ──────────────────────────────────────────────────────

    OptimizeRequest:
      type: object
      additionalProperties: false
      required:
        - customer_id
        - risk_profile
        - principal_amount
        - base_currency
        - value_date
        - tenure_months
        - channel
      allOf:
        - if:
            properties:
              channel: { enum: [BRANCH, RM_PORTAL] }
            required: [channel]
          then:
            required: [branch_code]
        - if:
            properties:
              is_manual_override: { const: true }
            required: [is_manual_override]
          then:
            required:
              - override_reason
              - approved_by
              - approval_timestamp
              - override_ticket_id
      properties:
        customer_id:
          type: string
          minLength: 1
          maxLength: 50
          pattern: '^[A-Za-z0-9-]+$'
          description: Bank's internal customer identifier (CIF). Used as the Redis cache key suffix.
        risk_profile:
          $ref: '#/components/schemas/CustomerRiskProfile'
          description: Customer's stated risk appetite. Required — drives advisory.fx_risk_flag logic.
        principal_amount:
          type: string
          pattern: '^\d+\.\d{2}$'
          description: Amount to deposit in `base_currency`. Minimum USD 1,000 equivalent validated server-side.
        base_currency:
          $ref: '#/components/schemas/DepositBaseCurrency'
          description: |
            Deposit source currency. INR triggers an NRE-only evaluation (no FCNR side).
            GCC currencies require `branch_code` to belong to an IFSC (GIFT City) unit.
        value_date:
          type: string
          format: date
          description: |
            Deposit funding date (YYYY-MM-DD). Must not be in the past.
            Used for exact Actual/360 (FCNR) and Actual/365 (NRE) day-count calculations.
        tenure_months:
          type: integer
          minimum: 12
          maximum: 60
          description: Deposit tenure in months (12–60, matching FCNR regulatory bounds).
        india_inflation_rate:
          type: string
          pattern: '^-?\d+\.\d{2,4}$'
          description: OPTIONAL. Expected annual inflation rate for India (e.g. "4.50").
        foreign_inflation_rate:
          type: string
          pattern: '^-?\d+\.\d{2,4}$'
          description: OPTIONAL. Expected annual inflation rate for the foreign economy (e.g. "2.00").
        fx_rate_overrides:
          $ref: '#/components/schemas/FXRateOverrides'
          description: SENIOR_RM and TREASURY only. See FXRateOverrides.
        market_rates_override:
          $ref: '#/components/schemas/MarketRatesOverride'
          description: |
            SENIOR_RM and TREASURY only. See MarketRatesOverride.
            Can be combined with fx_rate_overrides for a fully custom rate scenario.
        compounding_frequency:
          type: string
          enum: [QUARTERLY, HALF_YEARLY]
          default: QUARTERLY
          description: |
            RBI mandates QUARTERLY for NRE FDs — NRE always uses QUARTERLY regardless.
            HALF_YEARLY applies to the FCNR projection only where product terms allow.
        channel:
          $ref: '#/components/schemas/Channel'
        branch_code:
          type: string
          minLength: 1
          maxLength: 20
          pattern: '^[A-Za-z0-9-]+$'
          description: |
            Required when channel is BRANCH or RM_PORTAL.
            Required to be an IFSC (GIFT City) branch code when base_currency is a GCC
            currency (AED, SAR, QAR, OMR, BHD, KWD) — violations return 422 GCC_REQUIRES_IFSC_BRANCH.
        is_manual_override:
          type: boolean
          default: false
          description: |
            True when the RM proceeds with a product that differs from the engine's
            recommendation. Audit store records both the engine recommendation and the RM's choice.
        override_reason:
          type: string
          description: Mandatory justification when is_manual_override is true.
        approved_by:
          type: string
          minLength: 1
          maxLength: 50
          pattern: '^[A-Za-z0-9-]+$'
          description: Employee ID of the approving Senior RM or Treasury officer.
        approval_timestamp:
          type: string
          format: date-time
          description: ISO 8601 UTC timestamp of approval. Must not be in the future.
        override_ticket_id:
          type: string
          minLength: 1
          maxLength: 50
          pattern: '^[A-Za-z0-9-]+$'
          description: Reference ticket in the bank's workflow / approval system.
        assets:
          type: array
          maxItems: 20
          items:
            $ref: '#/components/schemas/AssetPosition'
          description: |
            GATEWAY-INJECTED. Do not send from the RM frontend. Populated from Redis or
            via the Lightweight ESB from the legacy CBS. Absent when X-Portfolio-Source is NOT_AVAILABLE.
        liabilities:
          type: array
          maxItems: 20
          items:
            $ref: '#/components/schemas/LiabilityPosition'
          description: |
            GATEWAY-INJECTED. Do not send from the RM frontend. Populated from Redis or
            via the Lightweight ESB from the legacy CBS. When absent, ALM penalty is zero.

    # ── Response schemas ──────────────────────────────────────────────────

    Advisory:
      type: object
      additionalProperties: false
      required:
        - recommended_product
        - compliance_warnings
        - fx_risk_flag
      properties:
        recommended_product:
          $ref: '#/components/schemas/Recommendation'
        compliance_warnings:
          type: array
          items: { type: string, minLength: 1 }
          description: |
            Operational flags for the RM. May include:
            - "Portfolio data unavailable (ESB could not reach CBS). ALM penalty not applied."
            - "FCNR(B) cannot be prematurely withdrawn within the first 12 months per RBI."
            - "GCC currency deposit routed through IFSC branch per RBI guidelines."
            - "FX rates are stale. Treat recommendation as indicative."
            - "RM-supplied rate override used. Recommendation is indicative — not based on live Live Market API data."
            - "One or more positions older than 30 days. Portfolio values may be stale."
            Empty array when no warnings apply.
        fx_risk_flag:
          type: boolean
          description: |
            True when `recommended_product` is FCNR and `risk_profile` is CONSERVATIVE.
            The RM must explicitly discuss currency risk before the customer commits.

    DecisionTrace:
      type: object
      additionalProperties: false
      required:
        - calculation_method
        - product_spot_rate_used
        - product_forward_rate_used
        - rates_source
        - alm_policy_version
        - portfolio_fx_matrix_used
        - total_assets_inr
        - total_liabilities_inr
        - alm_penalty_applied
        - alm_penalty_pct
        - alm_penalty_amount
        - fcnr_effective_yield_pct
        - nre_effective_yield_pct
      description: |
        Frozen inputs and intermediate math used to compute the recommendation.
        Immutable once written. Exposes every variable so an auditor can replicate
        the engine's math by hand — this API is not a black box.
      properties:
        calculation_method:
          $ref: '#/components/schemas/CalculationMethod'
        product_spot_rate_used:
          type: [string, 'null']
          pattern: '^\d+\.\d{2,6}$'
          description: |
            The precise spot rate used for the primary deposit conversion.
            Explicitly null when base_currency is INR (NRE-only evaluation).
        product_forward_rate_used:
          type: [string, 'null']
          pattern: '^\d+\.\d{2,6}$'
          description: |
            The precise forward rate used from the Live Market API curve.
            Explicitly null when base_currency is INR (NRE-only evaluation).
        rates_source:
          $ref: '#/components/schemas/RatesSource'
        alm_policy_version:
          type: string
          minLength: 1
          description: ALM policy version applied (e.g. "POL-2026-Q2").
        portfolio_fx_matrix_used:
          type: object
          description: |
            Snapshot of every exact cross-rate used to convert ALM portfolio positions
            to INR. Empty object if no foreign-currency ALM positions exist.
          patternProperties:
            '^[A-Z]{3}/[A-Z]{3}$': { type: string, pattern: '^\d+\.\d{2,6}$' }
          additionalProperties: false
        total_assets_inr:
          type: string
          pattern: '^\d+\.\d{2}$'
          description: Total value of all injected asset positions converted to INR. Zero when no assets provided.
        total_liabilities_inr:
          type: string
          pattern: '^\d+\.\d{2}$'
          description: Total value of all injected liability positions converted to INR. Zero when no liabilities provided.
        alm_penalty_applied:
          type: boolean
          description: True when total_liabilities_inr > total_assets_inr.
        alm_penalty_pct:
          type: string
          description: |
            The exact percentage penalty deducted from the nominal FCNR rate (e.g. "0.15").
            "0.00" when alm_penalty_applied is false.
        alm_penalty_amount:
          type: string
          description: |
            The monetary equivalent of the ALM penalty in INR.
            "0.00" when alm_penalty_applied is false.
        fcnr_effective_yield_pct:
          type: string
          pattern: '^-?\d+\.\d{2,4}$'
          description: |
            FCNR yield after the ALM penalty, before any inflation adjustment.
            Null-equivalent (omit comparison) when base_currency is INR — see product_spot_rate_used.
        nre_effective_yield_pct:
          type: string
          pattern: '^-?\d+\.\d{2,4}$'
          description: NRE yield after FX-adjustment to base currency, before any inflation adjustment.
        india_inflation_rate_used:
          type: string
          pattern: '^-?\d+\.\d{2,4}$'
          description: Echoed from the request. Present only when calculation_method is REAL_PPP_ADJUSTED.
        foreign_inflation_rate_used:
          type: string
          pattern: '^-?\d+\.\d{2,4}$'
          description: Echoed from the request. Present only when calculation_method is REAL_PPP_ADJUSTED.
        fcnr_real_yield_pct:
          type: string
          pattern: '^-?\d+\.\d{2,4}$'
          description: |
            FCNR yield after applying the Fisher equation to fcnr_effective_yield_pct.
            Populated only when calculation_method is REAL_INFLATION_ADJUSTED.
        nre_real_yield_pct:
          type: string
          pattern: '^-?\d+\.\d{2,4}$'
          description: |
            NRE yield after applying the Fisher equation to nre_effective_yield_pct.
            Populated only when calculation_method is REAL_INFLATION_ADJUSTED.

    ComplianceInfo:
      type: object
      additionalProperties: false
      required: [premature_withdrawal_note, tax_treatment, tds_applicable]
      properties:
        premature_withdrawal_note:
          type: string
          minLength: 1
          description: Pre-generated withdrawal rules for the recommended product. The RM can relay this directly.
        tax_treatment:
          type: string
          minLength: 1
          description: |
            Pre-generated Income Tax treatment summary. Both NRE and FCNR(B) interest
            is exempt under Section 10(4) of the Income Tax Act, 1961, for qualifying NRIs.
        tds_applicable:
          type: boolean
          description: Whether TDS applies. Typically false for NRE and FCNR accounts.

    ResponseMetadata:
      type: object
      additionalProperties: false
      required:
        - recommendation_id
        - traceparent
        - customer_id
        - value_date
        - computed_at
        - rates_as_of
        - policy_version
        - execution_time_ms
        - is_override_computation
        - portfolio_enrichment
      properties:
        recommendation_id:
          type: string
          format: uuid
          description: Stable ID for this recommendation. Use for GET /recommendations/{id}.
        traceparent:
          type: string
          pattern: '^00-[0-9a-f]{32}-[0-9a-f]{16}-[0-9a-f]{2}$'
          description: Echoed W3C traceparent for distributed trace linkage.
        customer_id:
          type: string
          minLength: 1
          maxLength: 50
          description: Echoed from request for audit trail linkage.
        value_date:
          type: string
          format: date
          description: Echoed from request. Confirms the funding date used for day-count calculations.
        computed_at:
          type: string
          format: date-time
          description: UTC timestamp when the recommendation was computed.
        rates_as_of:
          type: string
          format: date-time
          description: Timestamp of the live Live Market API rates used for this computation.
        retrieved_at:
          type: [string, 'null']
          format: date-time
          description: Populated on GET /recommendations/{id} only. Null on fresh POST responses.
        policy_version:
          type: string
          minLength: 1
          description: Rate and ALM policy version used (e.g. "POL-2026-Q2").
        execution_time_ms:
          type: integer
          minimum: 0
        is_override_computation:
          type: boolean
          description: |
            True when fx_rate_overrides or market_rates_override was used.
            Recommendation is based on non-live inputs and must be presented as indicative.
        portfolio_enrichment:
          $ref: '#/components/schemas/PortfolioEnrichment'

    OptimizeResponse:
      type: object
      additionalProperties: false
      required: [advisory, compliance, decision_trace, metadata]
      properties:
        advisory:
          $ref: '#/components/schemas/Advisory'
        compliance:
          $ref: '#/components/schemas/ComplianceInfo'
        decision_trace:
          $ref: '#/components/schemas/DecisionTrace'
        metadata:
          $ref: '#/components/schemas/ResponseMetadata'

    # ── Rates endpoint ────────────────────────────────────────────────────

    TenureRateEntry:
      type: object
      additionalProperties: false
      required: [tenure_months, annual_rate_pct, effective_from]
      properties:
        tenure_months: { type: integer, minimum: 12, maximum: 60 }
        annual_rate_pct:
          type: string
          pattern: '^\d+\.\d{2,4}$'
          description: Annual interest rate as a percentage (e.g. "7.25"). NOT a decimal.
        effective_from:
          type: string
          format: date

    FCNRCurrencyRates:
      type: object
      additionalProperties: false
      required: [currency, tenures]
      properties:
        currency:
          $ref: '#/components/schemas/FCNREligibleCurrency'
        tenures:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/TenureRateEntry' }

    RatesResponse:
      type: object
      additionalProperties: false
      required: [policy_version, rates_as_of, nre_rates, fcnr_rates, fx_spot_rates, fx_forward_rates]
      properties:
        policy_version: { type: string, minLength: 1 }
        rates_as_of:
          type: string
          format: date-time
          description: Timestamp when the Live Market API feed was last successfully refreshed.
        nre_rates:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/TenureRateEntry' }
          description: NRE FD rates by tenure. Currency-agnostic — NRE is always in INR.
        fcnr_rates:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/FCNRCurrencyRates' }
          description: FCNR rates per eligible currency (including GCC), then per tenure within each.
        fx_spot_rates:
          type: object
          description: |
            Current spot cross-rates across all eligible currency pairs, keyed as "CCY1/CCY2".
            Not limited to CCY/INR — supports full cross-currency conversion for ALM.
          patternProperties:
            '^[A-Z]{3}/[A-Z]{3}$': { type: string, pattern: '^\d+\.\d{2,6}$' }
          additionalProperties: false
        fx_forward_rates:
          type: object
          description: Forward rate curves per currency pair, keyed by tenure in months within each pair.
          patternProperties:
            '^[A-Z]{3}/[A-Z]{3}$':
              type: object
              patternProperties:
                '^\d+$': { type: string, pattern: '^\d+\.\d{2,6}$' }
              additionalProperties: false
          additionalProperties: false

    # ── Health ────────────────────────────────────────────────────────────

    DependencyStatus:
      type: object
      additionalProperties: false
      required: [status, is_critical, circuit_state]
      properties:
        status: { type: string, enum: [ok, error] }
        is_critical:
          type: boolean
          description: True if this dependency being down causes a 503 on the readiness probe.
        circuit_state:
          type: string
          enum: [CLOSED, OPEN, HALF_OPEN]
          description: |
            CLOSED    — healthy; requests pass through.
            OPEN      — failed; requests short-circuited immediately.
            HALF_OPEN — recovering; one probe request allowed through.
        latency_ms: { type: integer, minimum: 0 }
        error:
          type: [string, 'null']
          description: Error message when status is error. Null when ok.

    HealthReadyResponse:
      type: object
      additionalProperties: false
      required: [status, dependencies]
      properties:
        status:
          type: string
          enum: [ok, degraded]
          description: ok → 200. degraded → 503.
        dependencies:
          type: object
          description: |
            Named dependency → health detail. Expected keys: tms_feed, policy_config_store,
            idempotency_cache, audit_store, esb_layer (circuit breaker visibility only —
            the microservice does not call the ESB directly; Redis and the legacy CBS are
            Gateway dependencies and are not listed here).
          additionalProperties:
            $ref: '#/components/schemas/DependencyStatus'

    # ── RFC 7807 Error ────────────────────────────────────────────────────

    ErrorResponse:
      type: object
      additionalProperties: false
      required: [type, title, status, detail, instance]
      description: RFC 7807 Problem Detail. Returned on all 4xx and 5xx responses.
      properties:
        type:
          type: string
          format: uri
          description: URI identifying the problem type (e.g. https://api.bank.com/errors/unprocessable-entity).
        title:
          type: string
          minLength: 1
          description: Short, human-readable summary of the problem type.
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: string
          minLength: 1
          description: Human-readable explanation specific to this occurrence.
        instance:
          type: string
          description: Echo of the W3C `traceparent` for server-side log correlation.
        error_code:
          type: string
          description: Machine-readable code. See the Error Code Reference in the README.
          enum:
            - MISSING_REQUIRED_FIELD
            - INVALID_FORMAT
            - SIGNATURE_MISMATCH
            - TIMESTAMP_SKEW
            - INSUFFICIENT_ROLE
            - RECOMMENDATION_NOT_FOUND
            - RECOMMENDATION_EXPIRED
            - IDEMPOTENCY_CONFLICT
            - INVALID_CURRENCY
            - UNSUPPORTED_CURRENCY_PAIR
            - TENURE_OUT_OF_RANGE
            - PRINCIPAL_BELOW_MINIMUM
            - VALUE_DATE_IN_PAST
            - GCC_REQUIRES_IFSC_BRANCH
            - RATE_OVERRIDE_LIMIT_EXCEEDED
            - FUTURE_APPROVAL_TIMESTAMP
            - CIRCUIT_BREAKER_OPEN
            - DEPENDENCY_TIMEOUT
            - FX_FEED_UNAVAILABLE
        invalid_fields:
          type: object
          description: Field-level validation detail (populated on 400 and 422 only).
          additionalProperties:
            type: string

  # ── Responses ─────────────────────────────────────────────────────────────
  responses:

    BadRequest:
      description: Syntactically invalid JSON or missing required fields.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

    Unauthorized:
      description: |
        HMAC signature invalid (SIGNATURE_MISMATCH) or
        X-Gateway-Timestamp skew > ±30 s (TIMESTAMP_SKEW).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

    Forbidden:
      description: |
        Insufficient role. fx_rate_overrides and market_rates_override require
        SENIOR_RM or TREASURY. All other operations require RM, SENIOR_RM, or TREASURY.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

    NotFound:
      description: |
        Recommendation not found (RECOMMENDATION_NOT_FOUND) or past the 90-day
        retention window (RECOMMENDATION_EXPIRED).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

    IdempotencyConflict:
      description: Idempotency-Key used with a different body. Generate a new key or replay unchanged.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

    UnprocessableEntity:
      description: |
        Syntactically valid but semantically incorrect: zero principal, FCNR-ineligible
        currency, unsupported currency pair, tenure out of range, value_date in the past,
        GCC currency without an IFSC branch_code (GCC_REQUIRES_IFSC_BRANCH), rate override
        exceeds the deviation cap, or a future approval_timestamp.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

    TooManyRequests:
      description: Rate limit exceeded for this employee ID or originating IP.
      headers:
        Retry-After:
          schema: { type: integer, minimum: 0 }
          description: Seconds until the rate-limit window resets.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

    InternalServerError:
      description: Unexpected server error. Retry with exponential back-off.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

    ServiceUnavailable:
      description: Core dependency failure or Circuit Breaker OPEN (Live Market API feed or ESB layer).
      headers:
        Retry-After:
          schema: { type: integer, minimum: 0 }
          description: Suggested seconds before retry.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ── Examples ──────────────────────────────────────────────────────────────
  examples:

    FrontendThinRequest:
      summary: Standard RM request — Live Market API rates, GCC currency, no inflation
      value:
        customer_id: "CIF-9988776"
        risk_profile: "MODERATE"
        principal_amount: "1000000.00"
        base_currency: "AED"
        value_date: "2026-07-01"
        tenure_months: 36
        compounding_frequency: "QUARTERLY"
        channel: "RM_PORTAL"
        branch_code: "GIFT-001"

    RMCustomRatesRequest:
      summary: SENIOR_RM overrides a cross-rate, with dual inflation. INR base (NRE-only).
      value:
        customer_id: "CIF-9988776"
        risk_profile: "MODERATE"
        principal_amount: "5000000.00"
        base_currency: "INR"
        value_date: "2026-07-01"
        tenure_months: 36
        india_inflation_rate: "4.50"
        foreign_inflation_rate: "2.00"
        fx_rate_overrides:
          portfolio_cross_rates:
            "GBP/INR": "105.7500"
        compounding_frequency: "QUARTERLY"
        channel: "RM_PORTAL"
        branch_code: "BOM-001"

    GatewayEnrichedRequest:
      summary: Microservice payload with multi-currency positions and dual inflation
      value:
        customer_id: "CIF-9988776"
        risk_profile: "MODERATE"
        principal_amount: "1000000.00"
        base_currency: "USD"
        value_date: "2026-07-01"
        tenure_months: 36
        india_inflation_rate: "4.50"
        foreign_inflation_rate: "2.00"
        compounding_frequency: "QUARTERLY"
        channel: "RM_PORTAL"
        branch_code: "BOM-001"
        liabilities:
          - outstanding_principal: "450000.00"
            currency: "GBP"
            liability_type: "HOME_LOAN"
            source: "LOS"
            valuation_date: "2026-06-08"

    ManualOverrideRequest:
      summary: RM overrides recommendation with Senior RM approval
      value:
        customer_id: "CIF-9988776"
        risk_profile: "CONSERVATIVE"
        principal_amount: "1000000.00"
        base_currency: "USD"
        value_date: "2026-07-01"
        tenure_months: 36
        compounding_frequency: "QUARTERLY"
        channel: "BRANCH"
        branch_code: "BOM-001"
        is_manual_override: true
        override_reason: "Customer prefers NRE for premature withdrawal flexibility. FX risk discussed and documented in CRM."
        approved_by: "EMP-98765"
        approval_timestamp: "2026-06-08T10:15:00Z"
        override_ticket_id: "TKT-112233"

    OptimizeResponse:
      summary: FCNR recommended via exact Fisher real-yield calculation
      value:
        advisory:
          recommended_product: "FCNR"
          compliance_warnings: []
          fx_risk_flag: true
        compliance:
          premature_withdrawal_note: "FCNR(B) deposits cannot be prematurely withdrawn within the first 12 months per RBI Master Direction."
          tax_treatment: "Interest on both NRE and FCNR(B) accounts is exempt from Indian Income Tax under Section 10(4) of the Income Tax Act, 1961, for qualifying NRIs."
          tds_applicable: false
        decision_trace:
          calculation_method: "REAL_PPP_ADJUSTED"
          product_spot_rate_used: "83.4500"
          product_forward_rate_used: "86.1000"
          rates_source: "LIVE_MARKET_API"
          alm_policy_version: "POL-2026-Q2"
          portfolio_fx_matrix_used:
            "GBP/INR": "105.4000"
          total_assets_inr: "0.00"
          total_liabilities_inr: "47430000.00"
          alm_penalty_applied: true
          alm_penalty_pct: "0.35"
          alm_penalty_amount: "3500.00"
          fcnr_effective_yield_pct: "4.85"
          nre_effective_yield_pct: "7.10"
          india_inflation_rate_used: "4.50"
          foreign_inflation_rate_used: "2.00"
          fcnr_real_yield_pct: "0.67"
          nre_real_yield_pct: "2.63"
        metadata:
          recommendation_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
          traceparent: "00-4bf92f3577b34da6a3ce929d0e0e4736-00f067aa0ba902b7-01"
          customer_id: "CIF-9988776"
          value_date: "2026-07-01"
          computed_at: "2026-06-16T11:06:00Z"
          rates_as_of: "2026-06-16T11:00:00Z"
          retrieved_at: null
          policy_version: "POL-2026-Q2"
          execution_time_ms: 72
          is_override_computation: false
          portfolio_enrichment:
            source: "ESB_FETCH"
            positions_injected:
              asset_count: 0
              liability_count: 1
